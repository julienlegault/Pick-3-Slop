<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick 3 Slop - Testing</title>
  <link rel="stylesheet" href="./testing.css" />
</head>
<body>
    <div class="wrap">
      <h1>PICK 3 SLOP — TESTING</h1>
      <div class="controls">
        <label for="runsInput" class="control-label">Runs</label>
        <input id="runsInput" type="number" min="1" step="1" value="400" />
        <label for="maxSpinsInput" class="control-label">Max spins per run</label>
        <input id="maxSpinsInput" type="number" min="1" step="1" value="75" />
        <label for="xMetricSelect" class="control-label">X axis</label>
        <select id="xMetricSelect">
          <option value="spins">number of spins</option>
          <option value="nonCommonBoons">number of non-common boons</option>
          <option value="runs">number of runs</option>
          <option value="wheelGrowthSize">wheel growth size</option>
          <option value="avgBoonRarity">average boon rarity</option>
          <option value="avgBoonSelectability">average boon selectability</option>
        </select>
        <label for="yMetricSelect" class="control-label">Y axis</label>
        <select id="yMetricSelect">
          <option value="spins">number of spins</option>
          <option value="nonCommonBoons" selected>number of non-common boons</option>
          <option value="runs">number of runs</option>
          <option value="wheelGrowthSize">wheel growth size</option>
          <option value="avgBoonRarity">average boon rarity</option>
          <option value="avgBoonSelectability">average boon selectability</option>
        </select>
        <label for="colorMetricSelect" class="control-label">Color gradient</label>
        <select id="colorMetricSelect">
          <option value="spins">number of spins</option>
          <option value="nonCommonBoons">number of non-common boons</option>
          <option value="runs">number of runs</option>
          <option value="wheelGrowthSize">wheel growth size</option>
          <option value="avgBoonRarity">average boon rarity</option>
          <option value="avgBoonSelectability" selected>average boon selectability</option>
        </select>
        <label class="control-inline">
          <input id="showDebugInput" type="checkbox" checked />
          Show run debug
        </label>
        <button id="runBtn">Run Simulation</button>
        <label for="permCountInput" class="control-label">Permutations</label>
        <input id="permCountInput" type="number" min="1" step="100" value="500" />
        <button id="permBtn">Run Permutations</button>
        <a href="./index.html?notrack" style="color:#6ea8ff;text-align:right;">Back to game</a>
      </div>
    <div class="grid">
      <div class="panel">
        <div class="sub">Boon Priority (top = highest preference)</div>
        <ul id="boonList"></ul>
      </div>
      <div class="panel">
        <div id="plotDescription" class="sub">Dot plot of simulation runs</div>
        <canvas id="plot" width="900" height="560" role="img" aria-label="Dot plot of simulation runs."></canvas>
        <div id="status" role="status" aria-live="polite"></div><span id="spinner" class="spinner" aria-hidden="true"></span>
        <div id="runDebugSub" class="sub run-debug-sub">Run debug: each picked boon is boxed by its own rarity, with an outer box showing the highest rarity offered in that shop</div>
        <div id="runLog" role="log" aria-live="polite" aria-label="Simulation run log"></div>
      </div>
    </div>
  </div>

  <script src="./pick3-logic.js"></script>
  <script src="./testing.js"></script>
</body>
</html>
